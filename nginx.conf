# Nginx Configuration for qiantiannet.com
# Save as: /etc/nginx/sites-available/qiantiannet.com
# Enable with: sudo ln -s /etc/nginx/sites-available/qiantiannet.com /etc/nginx/sites-enabled/

# HTTP Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name qiantiannet.com www.qiantiannet.com;
    
    location / {
        return 301 https://$server_name$request_uri;
    }
    
    # Allow Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# HTTPS Configuration
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name qiantiannet.com www.qiantiannet.com;
    
    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/qiantiannet.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/qiantiannet.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HSTS Header
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self' https: data:; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; font-src 'self' https:; connect-src 'self' https://www.google-analytics.com" always;
    
    # Server Info
    server_tokens off;
    
    # Root Directory
    root /var/www/qiantiannet.com/html;
    index index.html index.htm;
    
    # Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/javascript application/json application/xml+rss 
               application/atom+xml image/svg+xml;
    
    # Caching for Static Assets
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|webp|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # Caching for HTML Files
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }
    
    # Main Location
    location / {
        try_files $uri $uri/ =404;
        add_header Cache-Control "public, max-age=3600";
    }
    
    # Deny Access to Sensitive Files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    location ~ ~$ {
        deny all;
        access_log off;
        log_not_found off;
    }
    
    # Prevent Direct Access to Log Files
    location ~* \.log$ {
        deny all;
    }
    
    # Prevent Script Execution in Specific Directories
    location ~/\.htaccess {
        deny all;
    }
    
    # Rate Limiting
    limit_req zone=general burst=20 nodelay;
    limit_req_status 429;
    
    # Error Pages
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
    
    # Access and Error Logs
    access_log /var/log/nginx/qiantiannet.com.access.log combined;
    error_log /var/log/nginx/qiantiannet.com.error.log warn;
}

# Upstream Rate Limiting
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $server_name zone=server:10m rate=100r/s;

# Map for User Agent Blocking
map $http_user_agent $bot_block {
    ~*MJ12bot 1;
    ~*AhrefsBot 1;
    ~*SemrushBot 1;
    ~*DotBot 1;
    default 0;
}

server {
    if ($bot_block) {
        return 403;
    }
}
